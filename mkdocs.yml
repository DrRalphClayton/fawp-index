site_name: fawp-index
site_description: FAWP Alpha Index — Information-Control Exclusion Principle detector
site_url: https://fawp-index.readthedocs.io/en/latest/
repo_url: https://github.com/DrRalphClayton/fawp-index
repo_name: DrRalphClayton/fawp-index
copyright: Ralph Clayton (2026) · doi:10.5281/zenodo.18673949

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: amber
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy
  font:
    text: DM Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting started: quickstart.md
  - Scanners:
      - Finance: market.md
      - Weather: weather.md
      - Alerts: alerts.md
  - API reference:
      - Examples: examples.md
      - Dashboard: dashboard.md
      - Watchlist: watchlist.md
      - Significance: significance.md
      - Benchmarks: benchmarks.md
  - Changelog: release_v0_23_0.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DrRalphClayton/fawp-index
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fawp-index/

extra_css:
  - assets/fawp.css

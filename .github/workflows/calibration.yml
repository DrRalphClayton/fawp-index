name: Calibration Check

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:
  push:
    paths:
      - 'fawp_index/constants.py'

jobs:
  calibration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[test]"
      - name: Run calibration checks
        run: fawp-index verify
      - name: Print timing summary
        run: fawp-index timing

name: Publish to PyPI + Create GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install + test
        run: |
          pip install -e ".[plot,report]"
          pip install pytest
          pytest tests/ -x -q

  release:
    name: Build · Publish · Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          python3 << 'PYEOF'
          import re, os
          tag = os.environ["GITHUB_REF_NAME"]           # e.g. v0.13.0
          version = tag.lstrip("v")
          src = open("CHANGELOG.md").read()
          # Match from "## [version]" to the next "## [" or end
          pattern = rf"(## \[{re.escape(version)}\].*?)(?=\n## \[|\Z)"
          m = re.search(pattern, src, re.DOTALL)
          body = m.group(1).strip() if m else f"See CHANGELOG.md for v{version} notes."
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("body<<EOF_BODY\n")
              f.write(body + "\n")
              f.write("EOF_BODY\n")
          PYEOF
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "fawp-index ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz

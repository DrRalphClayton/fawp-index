name: Auto-update CHANGELOG

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          echo "tag=${PREV}" >> $GITHUB_OUTPUT

      - name: Generate CHANGELOG entry
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PREV="${{ steps.prev.outputs.tag }}"
          DATE=$(date +%Y-%m-%d)

          echo "## v${VERSION} — ${DATE}" > /tmp/new_entry.md
          echo "" >> /tmp/new_entry.md
          if [ -n "$PREV" ]; then
            git log ${PREV}..HEAD --pretty=format:"- %s" \
              | grep -v "^- Merge" >> /tmp/new_entry.md
          else
            echo "- Initial release" >> /tmp/new_entry.md
          fi
          echo "" >> /tmp/new_entry.md
          echo "" >> /tmp/new_entry.md

          # Prepend to CHANGELOG.md after the first line (title)
          if [ -f CHANGELOG.md ]; then
            head -1 CHANGELOG.md > /tmp/changelog_new.md
            echo "" >> /tmp/changelog_new.md
            cat /tmp/new_entry.md >> /tmp/changelog_new.md
            tail -n +2 CHANGELOG.md >> /tmp/changelog_new.md
            mv /tmp/changelog_new.md CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            cat /tmp/new_entry.md >> CHANGELOG.md
          fi

      - name: Commit CHANGELOG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: auto-update CHANGELOG for v${{ steps.ver.outputs.version }}"
          git push origin HEAD:main

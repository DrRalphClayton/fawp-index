# .readthedocs.yaml
# ReadTheDocs configuration — builds MkDocs docs at every push to main.
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - requirements: .binder/requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - dev
